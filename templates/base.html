{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#941c53">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="JCL Cashier">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{% block title %}JCL Inventory System{% endblock %}</title>
    <link rel="manifest" href="{% static 'manifest.webmanifest' %}">
    <link rel="icon" href="{% static 'app-icon.svg' %}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{% static 'app-icon.svg' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(255, 255, 255, 0.76);
            --surface-strong: #ffffff;
            --border: rgba(166, 44, 104, 0.14);
            --ink: #4a102c;
            --muted: #8d647f;
            --primary: #f04d94;
            --primary-deep: #941c53;
            --accent: #ffc4df;
            --accent-strong: #ff85b8;
            --danger-soft: #ffe5ee;
            --success-soft: #fce7f2;
            --warning-soft: #ffe4f0;
            --shadow-lg: 0 32px 80px rgba(172, 38, 102, 0.18);
            --shadow-md: 0 20px 48px rgba(172, 38, 102, 0.11);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
        }
        body {
            font-family: "Manrope", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 8%, rgba(240, 77, 148, 0.2), transparent 22%),
                radial-gradient(circle at 88% 10%, rgba(255, 196, 223, 0.5), transparent 20%),
                radial-gradient(circle at 50% 100%, rgba(255, 133, 184, 0.12), transparent 26%),
                linear-gradient(180deg, #fff8fc 0%, #ffeef7 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.35) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.35) 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.3;
            pointer-events: none;
            z-index: -1;
        }
        h1, h2, h3, h4, h5, h6 {
            font-weight: 800;
            letter-spacing: -0.03em;
        }
        .mono {
            font-family: "IBM Plex Mono", monospace;
        }
        .text-muted {
            color: var(--muted) !important;
        }
        .text-white-50 {
            color: rgba(255, 255, 255, 0.88) !important;
        }
        .app-shell {
            max-width: 1360px;
        }
        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            background: rgba(230, 73, 128, 0.12);
            color: var(--primary-deep);
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .card {
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            background: var(--surface);
            backdrop-filter: blur(22px);
            box-shadow: var(--shadow-md);
        }
        .card-soft {
            background: rgba(255, 255, 255, 0.62);
        }
        .hero-panel {
            padding: 2rem;
            border-radius: 30px;
            background:
                linear-gradient(135deg, rgba(240, 77, 148, 0.97), rgba(122, 18, 63, 0.95)),
                linear-gradient(135deg, rgba(255, 196, 223, 0.24), transparent);
            color: #fff;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.22);
        }
        .hero-panel::after {
            content: "";
            position: absolute;
            right: -40px;
            top: -50px;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }
        .hero-panel::before {
            content: "";
            position: absolute;
            right: 90px;
            bottom: -70px;
            width: 190px;
            height: 190px;
            border-radius: 50%;
            background: rgba(255, 159, 197, 0.2);
        }
        .hero-panel > * {
            position: relative;
            z-index: 1;
        }
        .hero-orb {
            position: absolute;
            right: 8%;
            bottom: 10%;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.65), rgba(255,255,255,0.08));
            opacity: 0.7;
        }
        .quick-stat {
            padding: 1.25rem;
            border-radius: var(--radius-lg);
            background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,245,250,0.84));
            border: 1px solid rgba(255,255,255,0.6);
            height: 100%;
        }
        .quick-stat .value {
            font-size: clamp(1.7rem, 2vw, 2.3rem);
            font-weight: 800;
            letter-spacing: -0.04em;
        }
        .quick-stat .eyebrow {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            font-weight: 700;
        }
        .navbar-wrap {
            padding-top: 1rem;
        }
        .topbar {
            border: 1px solid rgba(255,255,255,0.22);
            background: linear-gradient(135deg, rgba(106, 18, 63, 0.92), rgba(73, 10, 41, 0.92));
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow-md);
            border-radius: 22px;
        }
        .navbar-brand {
            font-weight: 800;
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .brand-mark {
            width: 2.4rem;
            height: 2.4rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #ffd2e4);
            color: #7a1c4f;
            font-weight: 900;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
        }
        .nav-link {
            color: rgba(255,255,255,0.84) !important;
            font-weight: 600;
        }
        .nav-link:hover,
        .nav-link:focus {
            color: #ffffff !important;
        }
        .icon-nav {
            min-width: 2.9rem;
            min-height: 2.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.98rem;
            transition: 0.2s ease;
            gap: 0.6rem;
            padding: 0.75rem 0.95rem;
        }
        .icon-nav:hover,
        .icon-nav:focus {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        .icon-nav .label {
            font-size: 0.92rem;
            font-weight: 700;
            line-height: 1;
        }
        .user-chip {
            width: 2.9rem;
            height: 2.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 1rem;
        }
        .btn {
            border-radius: 14px;
            padding: 0.72rem 1rem;
            font-weight: 700;
            border-width: 1px;
        }
        .btn-sm {
            border-radius: 12px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-deep));
            border-color: transparent;
            box-shadow: 0 12px 24px rgba(230, 73, 128, 0.25);
        }
        .btn-primary:hover,
        .btn-primary:focus {
            background: linear-gradient(135deg, #f0568a, #c43770);
        }
        .btn-outline-primary {
            color: var(--primary-deep);
            border-color: rgba(230, 73, 128, 0.24);
            background: rgba(230, 73, 128, 0.05);
        }
        .btn-outline-primary:hover,
        .btn-outline-primary:focus {
            color: #fff;
            background: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-secondary {
            border-color: rgba(15, 23, 42, 0.12);
        }
        .btn-success {
            background: linear-gradient(135deg, #ef4a92, #bb2f68);
            border-color: transparent;
        }
        .btn-ghost {
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.34);
        }
        .btn-ghost:hover,
        .btn-ghost:focus {
            background: rgba(255, 255, 255, 0.26);
            color: #fff;
        }
        .form-control,
        .form-select {
            border-radius: 14px;
            border: 1px solid rgba(15, 23, 42, 0.12);
            padding: 0.78rem 0.95rem;
            background: rgba(255,255,255,0.94);
        }
        .form-control:focus,
        .form-select:focus {
            border-color: rgba(230, 73, 128, 0.42);
            box-shadow: 0 0 0 0.25rem rgba(230, 73, 128, 0.12);
        }
        .table {
            --bs-table-bg: transparent;
            margin-bottom: 0;
        }
        .table thead th {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            border-bottom-color: rgba(15, 23, 42, 0.08);
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        .table > :not(caption) > * > * {
            border-bottom-color: rgba(15, 23, 42, 0.06);
            vertical-align: middle;
            padding: 1rem 0.8rem;
        }
        .table tbody tr:hover {
            background: rgba(230, 73, 128, 0.04);
        }
        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }
        .futuristic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
        }
        .product-tile {
            position: relative;
            overflow: hidden;
        }
        .product-tile::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, rgba(255,255,255,0.25), transparent 48%);
            pointer-events: none;
        }
        .mini-note {
            font-size: 0.8rem;
            color: var(--muted);
        }
        .metric-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            border-radius: 999px;
            padding: 0.38rem 0.7rem;
            background: rgba(240, 77, 148, 0.08);
            color: var(--ink);
            font-size: 0.82rem;
            font-weight: 700;
        }
        .metric-chip-light {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            border-radius: 999px;
            padding: 0.42rem 0.7rem;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .status-pill.low {
            background: var(--warning-soft);
            color: #8b6600;
        }
        .status-pill.good {
            background: var(--success-soft);
            color: #157347;
        }
        .alert {
            border: 0;
            border-radius: 18px;
            box-shadow: var(--shadow-md);
        }
        .list-group-item {
            background: transparent;
            border-color: rgba(15, 23, 42, 0.06);
        }
        .receipt-paper {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem;
            background: #fff;
            border: 1px solid rgba(15, 23, 42, 0.12);
            border-radius: 16px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
        }
        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .receipt-kicker {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }
        .receipt-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.2rem;
        }
        .receipt-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem 1.25rem;
        }
        .receipt-meta-item {
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        }
        .receipt-meta-label {
            font-size: 0.78rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.2rem;
        }
        .receipt-meta-value {
            font-weight: 600;
            color: var(--ink);
        }
        .receipt-rule {
            border-top: 1px solid rgba(15, 23, 42, 0.12);
            margin: 1.5rem 0;
        }
        .receipt-table th,
        .receipt-table td {
            padding-left: 0;
            padding-right: 0;
        }
        .receipt-summary {
            max-width: 320px;
            margin-left: auto;
        }
        .receipt-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0;
        }
        .receipt-total-row.grand-total {
            font-size: 1.02rem;
            font-weight: 700;
            border-top: 1px solid rgba(15, 23, 42, 0.12);
            margin-top: 0.35rem;
            padding-top: 0.75rem;
        }
        .content-spacing {
            padding-top: 1.5rem;
            padding-bottom: 3rem;
        }
        .glass-panel {
            background: rgba(255,255,255,0.76);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow-md);
        }
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background: #fff;
            }
            .receipt-paper {
                box-shadow: none;
                max-width: 100%;
                border: 0;
                border-radius: 0;
                padding: 0;
            }
        }
        @media (max-width: 991.98px) {
            .hero-panel {
                padding: 1.5rem;
                border-radius: 24px;
            }
            .topbar {
                border-radius: 18px;
            }
            .content-spacing {
                padding-top: 1rem;
            }
        }
        @media (max-width: 767.98px) {
            body {
                background:
                    linear-gradient(180deg, #fff8fc 0%, #ffeef7 100%);
            }
            .navbar-wrap {
                padding-top: 0.5rem;
            }
            .app-shell {
                padding-left: 0.85rem;
                padding-right: 0.85rem;
            }
            .topbar {
                border-radius: 16px;
            }
            .navbar-brand {
                gap: 0.6rem;
                max-width: 72%;
            }
            .navbar-brand > span:last-child {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .navbar-brand .small {
                display: none !important;
            }
            .brand-mark {
                width: 2.15rem;
                height: 2.15rem;
                border-radius: 12px;
                font-size: 0.82rem;
                flex: 0 0 auto;
            }
            .navbar-collapse {
                padding-top: 1rem;
            }
            .navbar-nav {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(3.2rem, 1fr));
                gap: 0.55rem;
                width: 100%;
            }
            .navbar-nav .nav-item,
            .navbar-nav .nav-link {
                width: 100%;
            }
            .icon-nav .label {
                display: none;
            }
            .icon-nav {
                width: 100%;
                min-width: 0;
                padding: 0.75rem;
            }
            .metric-chip {
                max-width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }
            .card,
            .glass-panel {
                border-radius: 18px;
            }
            .card-body.p-4 {
                padding: 1.1rem !important;
            }
            .hero-panel {
                padding: 1.15rem;
                border-radius: 18px;
            }
            .hero-panel::before,
            .hero-panel::after,
            .hero-orb {
                display: none;
            }
            .hero-panel .display-6 {
                font-size: 1.7rem;
            }
            .panel-title {
                align-items: flex-start;
                flex-direction: column;
                gap: 0.75rem;
            }
            .futuristic-grid {
                grid-template-columns: 1fr;
            }
            .btn,
            .form-control,
            .form-select {
                min-height: 2.85rem;
            }
            .receipt-paper {
                padding: 1.25rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container app-shell navbar-wrap">
        {% include "includes/navbar.html" %}
    </div>
    <main class="container app-shell content-spacing">
        {% include "includes/messages.html" %}
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/service-worker.js").catch(function () {});
            });
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>

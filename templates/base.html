{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#941c53">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="JCL Cashier">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{% block title %}JCL Inventory System{% endblock %}</title>
    <link rel="manifest" href="{% static 'manifest.webmanifest' %}">
    <link rel="icon" href="{% static 'app-icon.svg' %}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{% static 'app-icon.svg' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(255, 255, 255, 0.76);
            --surface-strong: #ffffff;
            --border: rgba(166, 44, 104, 0.14);
            --ink: #4a102c;
            --muted: #8d647f;
            --primary: #f04d94;
            --primary-deep: #941c53;
            --accent: #ffc4df;
            --accent-strong: #ff85b8;
            --danger-soft: #ffe5ee;
            --success-soft: #fce7f2;
            --warning-soft: #ffe4f0;
            --shadow-lg: 0 32px 80px rgba(172, 38, 102, 0.18);
            --shadow-md: 0 20px 48px rgba(172, 38, 102, 0.11);
            --radius-xl: 24px;
            --radius-lg: 18px;
            --radius-md: 14px;
        }
        body[data-theme="blue"] {
            --surface: rgba(255, 255, 255, 0.8);
            --surface-strong: #ffffff;
            --border: rgba(35, 98, 166, 0.16);
            --ink: #0d2d4d;
            --muted: #58718a;
            --primary: #2186d9;
            --primary-deep: #13518b;
            --accent: #b9e3ff;
            --accent-strong: #58b8ef;
            --danger-soft: #e8f4ff;
            --success-soft: #eaf8ff;
            --warning-soft: #fff3d6;
            --shadow-lg: 0 32px 80px rgba(28, 106, 166, 0.18);
            --shadow-md: 0 20px 48px rgba(28, 106, 166, 0.11);
        }
        body[data-theme="green"] {
            --surface: rgba(255, 255, 255, 0.8);
            --surface-strong: #ffffff;
            --border: rgba(37, 128, 96, 0.16);
            --ink: #123c2f;
            --muted: #5f746a;
            --primary: #2fa66f;
            --primary-deep: #176b48;
            --accent: #bff0d4;
            --accent-strong: #69d99a;
            --danger-soft: #ffe9e9;
            --success-soft: #e7f8ee;
            --warning-soft: #fff5dc;
            --shadow-lg: 0 32px 80px rgba(32, 126, 86, 0.18);
            --shadow-md: 0 20px 48px rgba(32, 126, 86, 0.11);
        }
        body[data-theme="dark"] {
            --surface: rgba(24, 27, 34, 0.82);
            --surface-strong: #20242d;
            --border: rgba(255, 255, 255, 0.1);
            --ink: #f4f7fb;
            --muted: #a8b2c1;
            --primary: #7cc7ff;
            --primary-deep: #3979b8;
            --accent: #c6e7ff;
            --accent-strong: #8bd4ff;
            --danger-soft: rgba(255, 110, 134, 0.18);
            --success-soft: rgba(92, 220, 154, 0.16);
            --warning-soft: rgba(255, 210, 117, 0.16);
            --shadow-lg: 0 32px 80px rgba(0, 0, 0, 0.34);
            --shadow-md: 0 20px 48px rgba(0, 0, 0, 0.24);
        }
        body {
            font-family: "Manrope", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 8%, rgba(240, 77, 148, 0.2), transparent 22%),
                radial-gradient(circle at 88% 10%, rgba(255, 196, 223, 0.5), transparent 20%),
                radial-gradient(circle at 50% 100%, rgba(255, 133, 184, 0.12), transparent 26%),
                linear-gradient(180deg, #fff8fc 0%, #ffeef7 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }
        body[data-theme="blue"] {
            background:
                radial-gradient(circle at 14% 8%, rgba(33, 134, 217, 0.18), transparent 22%),
                radial-gradient(circle at 86% 12%, rgba(88, 184, 239, 0.28), transparent 20%),
                linear-gradient(180deg, #f7fbff 0%, #eaf5ff 100%);
        }
        body[data-theme="green"] {
            background:
                radial-gradient(circle at 14% 8%, rgba(47, 166, 111, 0.18), transparent 22%),
                radial-gradient(circle at 86% 12%, rgba(105, 217, 154, 0.28), transparent 20%),
                linear-gradient(180deg, #f8fffb 0%, #eaf8f0 100%);
        }
        body[data-theme="dark"] {
            background:
                radial-gradient(circle at 14% 8%, rgba(124, 199, 255, 0.12), transparent 22%),
                radial-gradient(circle at 86% 12%, rgba(88, 184, 239, 0.08), transparent 20%),
                linear-gradient(180deg, #11151d 0%, #171b24 100%);
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.35) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.35) 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.3;
            pointer-events: none;
            z-index: -1;
        }
        h1, h2, h3, h4, h5, h6 {
            font-weight: 800;
            letter-spacing: -0.03em;
        }
        .mono {
            font-family: "IBM Plex Mono", monospace;
        }
        .text-muted {
            color: var(--muted) !important;
        }
        .text-white-50 {
            color: rgba(255, 255, 255, 0.88) !important;
        }
        .app-shell {
            max-width: 1360px;
        }
        .section-label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            background: rgba(230, 73, 128, 0.12);
            color: var(--primary-deep);
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .card {
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            background: var(--surface);
            backdrop-filter: blur(22px);
            box-shadow: var(--shadow-md);
        }
        .card-soft {
            background: rgba(255, 255, 255, 0.62);
        }
        .hero-panel {
            padding: 2rem;
            border-radius: 30px;
            background:
                linear-gradient(135deg, rgba(240, 77, 148, 0.97), rgba(122, 18, 63, 0.95)),
                linear-gradient(135deg, rgba(255, 196, 223, 0.24), transparent);
            color: #fff;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.22);
        }
        body[data-theme="blue"] .hero-panel {
            background:
                linear-gradient(135deg, rgba(33, 134, 217, 0.97), rgba(15, 72, 126, 0.95)),
                linear-gradient(135deg, rgba(185, 227, 255, 0.24), transparent);
        }
        body[data-theme="green"] .hero-panel {
            background:
                linear-gradient(135deg, rgba(47, 166, 111, 0.97), rgba(23, 97, 66, 0.95)),
                linear-gradient(135deg, rgba(191, 240, 212, 0.24), transparent);
        }
        body[data-theme="dark"] .hero-panel {
            background:
                linear-gradient(135deg, rgba(32, 36, 45, 0.98), rgba(11, 15, 23, 0.96)),
                linear-gradient(135deg, rgba(124, 199, 255, 0.16), transparent);
        }
        .hero-panel::after {
            content: "";
            position: absolute;
            right: -40px;
            top: -50px;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }
        .hero-panel::before {
            content: "";
            position: absolute;
            right: 90px;
            bottom: -70px;
            width: 190px;
            height: 190px;
            border-radius: 50%;
            background: rgba(255, 159, 197, 0.2);
        }
        .hero-panel > * {
            position: relative;
            z-index: 1;
        }
        .hero-orb {
            position: absolute;
            right: 8%;
            bottom: 10%;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.65), rgba(255,255,255,0.08));
            opacity: 0.7;
        }
        .quick-stat {
            padding: 1.25rem;
            border-radius: var(--radius-lg);
            background: linear-gradient(180deg, var(--surface-strong), var(--surface));
            border: 1px solid var(--border);
            height: 100%;
        }
        .quick-stat .value {
            font-size: clamp(1.7rem, 2vw, 2.3rem);
            font-weight: 800;
            letter-spacing: -0.04em;
        }
        .quick-stat .eyebrow {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            font-weight: 700;
        }
        .navbar-wrap {
            padding-top: 1rem;
        }
        .admin-user .navbar-wrap {
            max-width: none;
            padding: 0;
        }
        .admin-user main.app-shell {
            max-width: none;
            width: calc(100% - 18rem);
            margin-left: 18rem;
            margin-right: 0;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }
        .admin-sidebar {
            position: fixed;
            inset: 0 auto 0 0;
            width: 16.5rem;
            z-index: 1030;
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
            padding: 0;
            border-right: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.86);
            box-shadow: 10px 0 40px rgba(172, 38, 102, 0.08);
            backdrop-filter: blur(18px);
        }
        body[data-theme="blue"] .admin-sidebar {
            box-shadow: 10px 0 40px rgba(28, 106, 166, 0.08);
        }
        body[data-theme="green"] .admin-sidebar {
            box-shadow: 10px 0 40px rgba(32, 126, 86, 0.08);
        }
        body[data-theme="dark"] .admin-sidebar {
            background: rgba(24, 27, 34, 0.92);
            box-shadow: 10px 0 40px rgba(0, 0, 0, 0.28);
        }
        .sidebar-brand {
            min-height: 5.6rem;
            width: 100%;
            padding: 1.2rem 1.45rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: linear-gradient(135deg, var(--primary), #f86cb0);
            color: #fff;
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: -0.02em;
        }
        .sidebar-brand .brand-mark {
            width: 2.2rem;
            height: 2.2rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
        }
        .sidebar-brand-text {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sidebar-nav,
        .sidebar-footer,
        .mobile-menu-grid {
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
            width: 100%;
        }
        .sidebar-nav {
            flex: 1;
            padding: 0 1rem;
        }
        .sidebar-link {
            position: relative;
            width: 100%;
            min-height: 3.35rem;
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            gap: 0.9rem;
            border-radius: 12px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--ink);
            text-decoration: none;
            font-weight: 700;
            padding: 0.78rem 0.9rem;
            transition: 0.2s ease;
        }
        .sidebar-link:hover,
        .sidebar-link:focus {
            color: var(--primary-deep);
            background: rgba(240, 77, 148, 0.08);
            transform: translateY(-1px);
        }
        .sidebar-link.active {
            color: #fff;
            background: linear-gradient(135deg, var(--primary), #f86cb0);
            box-shadow: 0 12px 24px rgba(230, 73, 128, 0.2);
        }
        .sidebar-link i {
            width: 1.25rem;
            text-align: center;
            flex: 0 0 auto;
            font-size: 1.05rem;
        }
        .sidebar-link span {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.96rem;
        }
        .sidebar-button {
            border: 1px solid transparent;
            cursor: pointer;
        }
        .sidebar-section-label {
            margin: 1.35rem 0 0.35rem;
            padding: 0 0.9rem;
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid var(--border);
        }
        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 0.6rem;
            padding: 0.65rem 0.75rem;
            border-radius: 12px;
            background: rgba(240, 77, 148, 0.08);
            color: var(--ink);
            font-weight: 800;
        }
        .sidebar-user .user-chip {
            width: 2.1rem;
            height: 2.1rem;
            border-radius: 12px;
            background: var(--primary);
            border: 0;
            font-size: 0.9rem;
        }
        .sidebar-user span:last-child {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .mobile-adminbar {
            display: none;
            margin: 0.5rem 0.85rem 0;
        }
        .admin-mobile-menu {
            background: var(--surface-strong);
            color: var(--ink);
        }
        .mobile-user-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 14px;
            background: rgba(240, 77, 148, 0.08);
        }
        .admin-mobile-menu .mobile-menu-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .admin-mobile-menu .sidebar-link {
            min-height: 4.4rem;
            flex-direction: column;
            color: var(--ink);
            background: rgba(240, 77, 148, 0.08);
            border-color: var(--border);
        }
        .admin-mobile-menu .sidebar-link span {
            position: static;
            transform: none;
            opacity: 1;
            padding: 0;
            background: transparent;
            box-shadow: none;
            white-space: normal;
            pointer-events: auto;
        }
        .topbar {
            border: 1px solid rgba(255,255,255,0.22);
            background: linear-gradient(135deg, rgba(106, 18, 63, 0.92), rgba(73, 10, 41, 0.92));
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow-md);
            border-radius: 22px;
        }
        body[data-theme="blue"] .topbar {
            background: linear-gradient(135deg, rgba(16, 82, 138, 0.94), rgba(11, 50, 92, 0.94));
        }
        body[data-theme="green"] .topbar {
            background: linear-gradient(135deg, rgba(23, 107, 72, 0.94), rgba(13, 69, 48, 0.94));
        }
        body[data-theme="dark"] .topbar {
            background: linear-gradient(135deg, rgba(24, 28, 38, 0.96), rgba(10, 13, 20, 0.96));
        }
        .navbar-brand {
            font-weight: 800;
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .brand-mark {
            width: 2.4rem;
            height: 2.4rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #ffd2e4);
            color: #7a1c4f;
            font-weight: 900;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
        }
        body[data-theme="blue"] .brand-mark {
            color: #104a7c;
        }
        body[data-theme="green"] .brand-mark {
            color: #175f41;
        }
        body[data-theme="dark"] .brand-mark {
            color: #163651;
        }
        .nav-link {
            color: rgba(255,255,255,0.84) !important;
            font-weight: 600;
        }
        .nav-link:hover,
        .nav-link:focus {
            color: #ffffff !important;
        }
        .icon-nav {
            min-width: 2.9rem;
            min-height: 2.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 0.98rem;
            transition: 0.2s ease;
            gap: 0.6rem;
            padding: 0.75rem 0.95rem;
        }
        .icon-nav:hover,
        .icon-nav:focus {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        .icon-nav .label {
            font-size: 0.92rem;
            font-weight: 700;
            line-height: 1;
        }
        .user-chip {
            width: 2.9rem;
            height: 2.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 1rem;
        }
        .btn {
            border-radius: 14px;
            padding: 0.72rem 1rem;
            font-weight: 700;
            border-width: 1px;
        }
        .btn-sm {
            border-radius: 12px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-deep));
            border-color: transparent;
            box-shadow: 0 12px 24px rgba(230, 73, 128, 0.25);
        }
        .btn-primary:hover,
        .btn-primary:focus {
            background: linear-gradient(135deg, #f0568a, #c43770);
        }
        .btn-outline-primary {
            color: var(--primary-deep);
            border-color: rgba(230, 73, 128, 0.24);
            background: rgba(230, 73, 128, 0.05);
        }
        .btn-outline-primary:hover,
        .btn-outline-primary:focus {
            color: #fff;
            background: var(--primary);
            border-color: var(--primary);
        }
        .btn-outline-secondary {
            border-color: rgba(15, 23, 42, 0.12);
        }
        .btn-success {
            background: linear-gradient(135deg, var(--primary), var(--primary-deep));
            border-color: transparent;
        }
        .btn-ghost {
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.34);
        }
        .btn-ghost:hover,
        .btn-ghost:focus {
            background: rgba(255, 255, 255, 0.26);
            color: #fff;
        }
        .form-control,
        .form-select {
            border-radius: 14px;
            border: 1px solid rgba(15, 23, 42, 0.12);
            padding: 0.78rem 0.95rem;
            background: var(--surface-strong);
            color: var(--ink);
        }
        .form-control:focus,
        .form-select:focus {
            border-color: rgba(230, 73, 128, 0.42);
            box-shadow: 0 0 0 0.25rem rgba(230, 73, 128, 0.12);
        }
        .table {
            --bs-table-bg: transparent;
            margin-bottom: 0;
        }
        .table thead th {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            border-bottom-color: rgba(15, 23, 42, 0.08);
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        .table > :not(caption) > * > * {
            border-bottom-color: rgba(15, 23, 42, 0.06);
            vertical-align: middle;
            padding: 1rem 0.8rem;
        }
        .table tbody tr:hover {
            background: rgba(230, 73, 128, 0.04);
        }
        .panel-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }
        .futuristic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
        }
        .product-tile {
            position: relative;
            overflow: hidden;
        }
        .product-tile::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, rgba(255,255,255,0.25), transparent 48%);
            pointer-events: none;
        }
        .mini-note {
            font-size: 0.8rem;
            color: var(--muted);
        }
        .metric-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            border-radius: 999px;
            padding: 0.38rem 0.7rem;
            background: rgba(240, 77, 148, 0.08);
            color: var(--ink);
            font-size: 0.82rem;
            font-weight: 700;
        }
        .action-group {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .metric-chip-light {
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            border-radius: 999px;
            padding: 0.42rem 0.7rem;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .status-pill.low {
            background: var(--warning-soft);
            color: #8b6600;
        }
        .status-pill.good {
            background: var(--success-soft);
            color: #157347;
        }
        .alert {
            border: 0;
            border-radius: 18px;
            box-shadow: var(--shadow-md);
        }
        .list-group-item {
            background: transparent;
            border-color: rgba(15, 23, 42, 0.06);
        }
        .receipt-paper {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem;
            background: #fff;
            border: 1px solid rgba(15, 23, 42, 0.12);
            border-radius: 16px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
        }
        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .receipt-kicker {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }
        .receipt-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.2rem;
        }
        .receipt-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem 1.25rem;
        }
        .receipt-meta-item {
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
        }
        .receipt-meta-label {
            font-size: 0.78rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.2rem;
        }
        .receipt-meta-value {
            font-weight: 600;
            color: var(--ink);
        }
        .receipt-rule {
            border-top: 1px solid rgba(15, 23, 42, 0.12);
            margin: 1.5rem 0;
        }
        .receipt-table th,
        .receipt-table td {
            padding-left: 0;
            padding-right: 0;
        }
        .receipt-summary {
            max-width: 320px;
            margin-left: auto;
        }
        .receipt-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.4rem 0;
        }
        .receipt-total-row.grand-total {
            font-size: 1.02rem;
            font-weight: 700;
            border-top: 1px solid rgba(15, 23, 42, 0.12);
            margin-top: 0.35rem;
            padding-top: 0.75rem;
        }
        .content-spacing {
            padding-top: 1.5rem;
            padding-bottom: 3rem;
        }
        .glass-panel {
            background: rgba(255,255,255,0.76);
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow-md);
        }
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background: #fff;
            }
            .receipt-paper {
                box-shadow: none;
                max-width: 100%;
                border: 0;
                border-radius: 0;
                padding: 0;
            }
        }
        @media (max-width: 1199.98px) {
            .admin-sidebar {
                width: 14.75rem;
            }
            .admin-user main.app-shell {
                width: calc(100% - 15.8rem);
                margin-left: 15.8rem;
                padding-left: 1.1rem;
                padding-right: 1.1rem;
            }
            .sidebar-brand {
                padding-left: 1.1rem;
                padding-right: 1.1rem;
            }
            .sidebar-nav,
            .sidebar-footer {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }
        }
        @media (max-width: 767.98px) {
            .admin-sidebar {
                display: none;
            }
            .mobile-adminbar {
                display: flex;
            }
            .admin-user main.app-shell {
                max-width: 960px;
                width: 100%;
                margin-left: auto;
                margin-right: auto;
                padding-left: 0.85rem;
                padding-right: 0.85rem;
            }
            .hero-panel {
                padding: 1.5rem;
                border-radius: 24px;
            }
            .topbar {
                border-radius: 18px;
            }
            .content-spacing {
                padding-top: 1rem;
            }
            body {
                background:
                    linear-gradient(180deg, #fff8fc 0%, #ffeef7 100%);
            }
            .navbar-wrap {
                padding-top: 0.5rem;
            }
            .app-shell {
                padding-left: 0.85rem;
                padding-right: 0.85rem;
            }
            .topbar {
                border-radius: 16px;
            }
            .navbar-brand {
                gap: 0.6rem;
                max-width: 72%;
            }
            .navbar-brand > span:last-child {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .navbar-brand .small {
                display: none !important;
            }
            .brand-mark {
                width: 2.15rem;
                height: 2.15rem;
                border-radius: 12px;
                font-size: 0.82rem;
                flex: 0 0 auto;
            }
            .navbar-collapse {
                padding-top: 1rem;
            }
            .navbar-nav {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(3.6rem, 1fr));
                gap: 0.55rem;
                width: 100%;
            }
            .navbar-nav .nav-item,
            .navbar-nav .nav-link {
                width: 100%;
            }
            .icon-nav .label {
                display: none;
            }
            .icon-nav {
                width: 100%;
                min-width: 0;
                padding: 0.75rem;
            }
            .metric-chip {
                max-width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }
            .topbar .d-flex.flex-column.flex-lg-row {
                align-items: stretch !important;
                width: 100%;
            }
            .topbar .user-chip + .small {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .card,
            .glass-panel {
                border-radius: 18px;
            }
            .card-body.p-4 {
                padding: 1.1rem !important;
            }
            .hero-panel {
                padding: 1.15rem;
                border-radius: 18px;
            }
            .hero-panel::before,
            .hero-panel::after,
            .hero-orb {
                display: none;
            }
            .hero-panel .display-6 {
                font-size: 1.7rem;
            }
            .panel-title {
                align-items: flex-start;
                flex-direction: column;
                gap: 0.75rem;
            }
            .panel-title > * {
                width: 100%;
            }
            .panel-title .btn,
            .panel-title .metric-chip {
                width: 100%;
                justify-content: center;
            }
            .futuristic-grid {
                grid-template-columns: 1fr;
            }
            .btn,
            .form-control,
            .form-select {
                min-height: 2.85rem;
            }
            .receipt-paper {
                padding: 1.25rem;
            }
            .table-responsive {
                margin-left: -0.25rem;
                margin-right: -0.25rem;
                width: calc(100% + 0.5rem);
            }
            .table > :not(caption) > * > * {
                padding: 0.85rem 0.65rem;
            }
            .table td,
            .table th {
                white-space: nowrap;
            }
            .table td:first-child,
            .table th:first-child {
                white-space: normal;
                min-width: 11rem;
            }
            .table .small,
            .table .text-muted {
                white-space: normal;
            }
            .action-group,
            .table .text-end {
                min-width: 8.5rem;
                text-align: left !important;
            }
            .action-group .btn,
            .table .text-end .btn {
                margin-top: 0.25rem;
            }
            .hero-panel .d-flex.gap-2,
            .hero-panel .d-flex.flex-wrap {
                width: 100%;
            }
            .hero-panel .btn {
                flex: 1 1 100%;
                text-align: center;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body data-theme="{{ active_theme|default:'pink' }}" class="{% if request.user.is_staff %}admin-user{% endif %}">
    <div class="container app-shell navbar-wrap">
        {% include "includes/navbar.html" %}
    </div>
    <main class="container app-shell content-spacing">
        {% include "includes/messages.html" %}
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/service-worker.js").catch(function () {});
            });
        }
        function goBackOrHome(button) {
            var fallbackUrl = button.getAttribute("data-back-url") || "/";
            if (window.history.length > 1 && document.referrer) {
                window.history.back();
            } else {
                window.location.href = fallbackUrl;
            }
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>

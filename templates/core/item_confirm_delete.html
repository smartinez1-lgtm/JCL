{% extends "base.html" %}

{% block title %}Delete Item | JCL{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body p-4">
                <span class="section-label mb-3">Danger Zone</span>
                <h1 class="h4 mb-3">Delete Item</h1>
                <p class="text-muted">Are you sure you want to delete <strong>{{ item.name }}</strong> from inventory? This action cannot be undone from the interface.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'inventory_list' %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
